name: search-jobs

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID running the search'
        required: true
      role:
        description: 'Preferred Job Role'
        required: true
      locations:
        description: 'Locations (comma-separated)'
        required: true

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Job Search Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEMOTRON_API_KEY: ${{ secrets.NEMOTRON_API_KEY }}
        run: |
          python automation/search_jobs.py --user_id "${{ inputs.user_id }}" --role "${{ inputs.role }}" --locations "${{ inputs.locations }}"

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: search-failure-screenshots
          path: search_failure.png
