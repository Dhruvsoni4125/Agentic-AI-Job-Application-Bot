name: apply-job

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID applying'
        required: true
      job_id:
        description: 'Job ID to apply for'
        required: true
      resume_path:
        description: 'Storage path of the resume'
        required: true

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Auto Apply Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEMOTRON_API_KEY: ${{ secrets.NEMOTRON_API_KEY }}
        run: |
          python automation/apply_job.py --user_id "${{ inputs.user_id }}" --job_id "${{ inputs.job_id }}" --resume_path "${{ inputs.resume_path }}"

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apply-failure-screenshots
          path: |
            apply_not_found.png
            apply_button_mismatch.png
            apply_form_stuck.png
            apply_steps_limit.png
            apply_exception.png
